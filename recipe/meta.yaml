{% set name = "jaraco.text" %}
{% set version = "3.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: ede4e9103443b62b3d1d193257dfb85aab7c69a6cef78a0887d64bb307a03bc3

build:
  number: 2
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python
    - pip
    - setuptools_scm >=3.4.1
    - setuptools >=42
    - toml
    - wheel
  run:
    - python
    - jaraco.functools
    - importlib_resources  # [py<37]

test:
  imports:
    - jaraco.text
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/jaraco/jaraco.text
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Module for text manipulation'
  doc_url: https://jaracotext.readthedocs.io/
  dev_url: https://github.com/jaraco/jaraco.text

extra:
  recipe-maintainers:
    - carlodri
